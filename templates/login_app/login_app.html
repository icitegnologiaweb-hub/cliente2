<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Iniciar Sesión</title>
<link href="{{ url_for('static', filename='css/output.css') }}" rel="stylesheet">

<style>
body{
    background:
     
        linear-gradient(135deg, #0f172a 0%, #0b1220 100%);
    min-height:100vh;
}

/* Card glass */
.login-card{
    background: linear-gradient(180deg, #ffffff 0%, #f8fafc 100%);
    border-radius: 32px;
    padding: 45px 35px;
    box-shadow: 
        0 25px 60px rgba(15,23,42,.15);
    border: 1px solid rgba(255,255,255,.6);
}

/* efecto glow */
.login-card::before{
    content:"";
    position:absolute;
    width:200px;
    height:200px;
    background:radial-gradient(circle,#0ea5e9 0%,transparent 70%);
    top:-60px;
    right:-60px;
    opacity:.15;
}

/* Inputs */
.form-control-custom{
    border:1px solid #e5e7eb;
    border-radius:16px;
    padding:16px;
    font-size:16px;
    background:#f9fafb;
    transition:.25s;
}

.form-control-custom:focus{
    border-color:#2563eb;
    box-shadow:0 0 0 4px rgba(37,99,235,.15);
    background:white;
    outline:none;
}

/* Botón moderno */
.btn-primary-custom{
    background:linear-gradient(135deg,#2563eb,#0ea5e9);
    border-radius:18px;
    padding:16px;
    font-size:16px;
    font-weight:600;
    transition:.25s;
    box-shadow:0 10px 20px rgba(37,99,235,.3);
}

.btn-primary-custom:hover{
    transform:translateY(-2px);
    box-shadow:0 15px 30px rgba(37,99,235,.4);
}
</style>
</head>

<body class="flex items-center justify-center px-4">

<div class="w-full max-w-sm login-card p-8">

    <!-- Logo -->
    <div class="flex justify-center mb-6">
        <img src="{{ url_for('static', filename='img/logo.png') }}" class="h-16">
    </div>

    <h2 class="text-2xl font-bold text-center mb-6 text-gray-800">
        Bienvenido
    </h2>

    <form method="POST" class="space-y-5" autocomplete="on">

        <!-- Email -->
        <div>
            <label class="block text-sm mb-2 text-gray-500">
                Correo electrónico
            </label>
            <input type="email"
                   name="email"
                   required
                   autocomplete="username"
                   class="w-full form-control-custom">
        </div>

        <!-- Password -->
        <div class="relative">
            <label class="block text-sm mb-2 text-gray-500">
                Contraseña
            </label>

            <input 
                type="password" 
                name="password" 
                id="password"
                required
                autocomplete="current-password"
                class="w-full form-control-custom pr-12">

            <button 
                type="button"
                onclick="togglePassword()"
                class="absolute right-4 top-[45px] text-gray-400">

                <svg id="eyeClosed" xmlns="http://www.w3.org/2000/svg" 
                    class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" 
                    d="M13.875 18.825A10.05 10.05 0 0112 19c-5 0-9-7-9-7a17.1 17.1 0 012.805-3.565M6.18 6.18A9.953 9.953 0 0112 5c5 0 9 7 9 7a16.978 16.978 0 01-4.043 4.943M15 12a3 3 0 11-6 0 3 3 0 016 0zm6 6L3 3" />
                </svg>

                <svg id="eyeOpen" xmlns="http://www.w3.org/2000/svg" 
                    class="h-5 w-5 hidden" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" 
                    d="M15 12a3 3 0 11-6 0 3 3 0 016 0zm7.938 0C21.729 14.943 17.74 18 12 18c-5.74 0-9.729-3.057-10.938-6C2.271 9.057 6.26 6 12 6c5.74 0 9.729 3.057 10.938 6z" />
                </svg>

            </button>
        </div>

        <!-- Guardar sesión -->
        <div class="flex items-center justify-between text-sm">
            <label class="flex items-center gap-2 cursor-pointer">
                <input type="checkbox" name="recordar" class="rounded border-gray-300">
                <span class="text-gray-600">Guardar sesión</span>
            </label>
        </div>

        <!-- Botón -->
        <button type="submit"
            class="w-full text-white btn-primary-custom">
            Ingresar
        </button>

        {% if error %}
        <div class="bg-red-100 text-red-600 text-sm p-3 rounded-lg text-center">
            {{ error }}
        </div>
        {% endif %}

    </form>

    <div class="mt-8 text-center text-xs text-gray-400">
        © 2026 ML
    </div>

</div>

<script>
function togglePassword(){
    const passwordInput=document.getElementById("password");
    const eyeOpen=document.getElementById("eyeOpen");
    const eyeClosed=document.getElementById("eyeClosed");

    if(passwordInput.type==="password"){
        passwordInput.type="text";
        eyeOpen.classList.remove("hidden");
        eyeClosed.classList.add("hidden");
    }else{
        passwordInput.type="password";
        eyeOpen.classList.add("hidden");
        eyeClosed.classList.remove("hidden");
    }
}
</script>

</body>
</html>
